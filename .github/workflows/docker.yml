name: docker
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t whatsapp-rag-eval-kit:ci .
      - name: Show image size
        run: docker images whatsapp-rag-eval-kit:ci
