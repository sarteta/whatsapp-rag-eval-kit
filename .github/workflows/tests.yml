name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e .
      - run: pip install pytest
      - run: pytest tests/ -v
      - name: Run example suite
        run: python -m whatsapp_rag_eval --suite suites/clinic-es.yml --report out/ci-report.md || echo "Some cases failed as expected — kit returns non-zero when failures present"
